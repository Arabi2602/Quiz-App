<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>টাইমারসহ কুইজ অ্যাপ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container" id="quiz">
        <div class="quiz-header">
            <h2 id="question-number">প্রশ্ন ১/৪</h2>
            <div class="timer">সময় বাকি: <span id="time-left">১০</span> সেকেন্ড</div>
        </div>

        <div class="question-container">
            <h3 id="question-text">এখানে প্রশ্নটি দেখাবে...</h3>
        </div>

        <div class="options-container" id="options">
            </div>

        <button id="next-btn" class="next-btn hide">পরবর্তী প্রশ্ন</button>
    </div>

    <div class="result-container hide" id="result-box">
        <h2>কুইজ সম্পন্ন হয়েছে!</h2>
        <p>আপনার মোট স্কোর: <span id="score">০</span> / <span id="total-questions">৪</span></p>
        <button id="restart-btn" class="restart-btn">আবার খেলুন</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
